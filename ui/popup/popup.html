<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>تَرجمان الزَّنَاد</title><link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <header class="popup-header"><h1>تَرجمان الزَّنَاد</h1></header>
        <main class="popup-content">
            <section class="form-section">
                <div class="form-group"><label for="source-lang">من</label><select id="source-lang"></select></div>
                <div class="form-group"><label for="target-lang">إلى</label><select id="target-lang"></select></div>
            </section>
            <section class="controls-section">
                <div class="control-item">
                    <span>اتجاه النص (RTL)</span>
                    <label class="switch"><input type="checkbox" id="rtl-toggle"><span class="slider"></span></label>
                </div>
                <!-- قسم الترجمة التلقائية - يظهر عند عدم تفعيل الترجمة الشاملة -->
                <div class="control-item auto-translate-control">
                    <span>ترجمة هذا الموقع دائماً</span>
                    <label class="switch"><input type="checkbox" id="auto-translate-toggle"><span class="slider"></span></label>
                </div>
                <!-- قسم استثناء الصفحة - يظهر عند تفعيل الترجمة الشاملة -->
                <div class="control-item exclude-site-control" style="display: none;">
                    <span>استثناء هذا الموقع</span>
                    <label class="switch"><input type="checkbox" id="exclude-site-toggle"><span class="slider"></span></label>
                </div>
            </section>
            <button id="translate-btn" class="action-button">ترجمة الصفحة</button>
        </main>
        <footer class="popup-footer">
            <button id="settings-btn" class="icon-button" title="الإعدادات">
                <svg viewBox="0 0 1024 1024" class="icon" version="1.1" xmlns="http://www.w3.org/2000/svg"><path d="M370.1 737.5l13.7 7.3c15.6 8.2 33 15.6 51.3 21.1l14.7 4.6v68.7c0 16.5 11 20.2 20.2 20.2h82.4c9.2 0 20.2-3.7 20.2-20.2v-68.7l14.7-4.6c18.3-5.5 35.7-12.8 51.3-21.1l13.7-7.3 11 11c19.2 19.2 32.1 33 37.6 36.6 4.6 4.6 9.2 7.3 13.7 7.3 8.2 0 15.6-6.4 15.6-7.3l58.6-58.6c6.4-6.4 11.9-17.4 0-29.3l-48.5-48.5 7.3-13.7c8.2-15.6 15.6-33 21.1-51.3l4.6-14.7H842c16.5 0 20.2-11 20.2-20.2v-82.4c0-9.2-3.7-20.2-20.2-20.2h-68.7l-4.6-14.7c-6.4-17.4-12.8-34.8-22-50.4l-7.3-13.7 11-11 37.6-37.6c4.6-4.6 7.3-9.2 7.3-13.7 0-6.4-4.6-12.8-7.3-15.6L729.2 231c-1.8-1.8-8.2-7.3-15.6-7.3-4.6 0-9.2 1.8-13.7 7.3l-48.5 48.5-13.7-7.3c-15.6-8.2-33-15.6-50.4-21.1l-14.7-3.7v-69.6c0-17.4-14.7-20.2-21.1-20.2H470c-6.4 0-20.2 2.7-20.2 20.2v69.6l-14.7 4.6c-17.4 5.5-34.8 11.9-50.4 21.1l-13.7 7.3-49.4-49.4c-4.6-4.6-9.2-6.4-12.8-6.4-7.3 0-14.7 5.5-16.5 7.3l-58.6 57.7c-3.7 4.6-12.8 16.5 0 29.3l48.5 48.6-7.3 13.7c-8.2-15.6-15.6-33-21.1-50.4l-4.6-14.7h-68.7c-16.5 0.9-20.2 13.7-20.2 22v81.5c0 6.4 2.7 20.2 20.2 20.2h68.7l4.6 14.7c5.5 18.3 12.8 34.8 21.1 51.3l7.3 13.7-48.5 48.5c-11.9 11.9-4.6 23.8 0 29.3l57.7 57.7c1.8 0.9 9.2 6.4 15.6 6.4 4.6 0 8.2-1.8 12.8-6.4l50.3-47.7z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>

    </div>

</body>
</html>
